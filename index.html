<!DOCTYPE html>
<html>
<head>
    <title>CatBall v2 (Matter.js)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<script>
    const { Engine, Render, Runner, World, Bodies, Body, Constraint, Events } = Matter;

    const engine = Engine.create();
    const world = engine.world;

    const render = Render.create({
        element: document.body,
        engine: engine,
        options: { width: 400, height: 600, wireframes: false, background: '#fffaf0' }
    });

    Render.run(render);
    Runner.run(Runner.create(), engine);

    // 1. 벽과 바닥 (고양이 탈출 방지)
    const walls = [
        Bodies.rectangle(200, 0, 400, 20, { isStatic: true }), // 상단
        Bodies.rectangle(0, 300, 20, 600, { isStatic: true }), // 좌측
        Bodies.rectangle(400, 300, 20, 600, { isStatic: true }), // 우측
    ];
    World.add(world, walls);

    // 2. 캣볼 (고양이 공)
    const catBall = Bodies.circle(200, 100, 15, {
        restitution: 0.6, // 탄성
        friction: 0.01,
        render: { fillStyle: '#f5f5f5', strokeStyle: '#ffb6c1', lineWidth: 3 }
    });
    World.add(world, catBall);

    // 3. 플리퍼 (고양이 솜방망이) 함수
    function createFlipper(x, y, side) {
        const group = Body.nextGroup(true);
        const length = 70;
        const flipper = Bodies.rectangle(x, y, length, 15, {
            collisionFilter: { group: group },
            chamfer: { radius: 7 },
            render: { fillStyle: '#ffb6c1' }
        });

        const pivotX = side === 'left' ? x - length/2 : x + length/2;
        const anchor = { x: pivotX, y: y };
        
        const pin = Constraint.create({
            bodyB: flipper,
            pointB: { x: side === 'left' ? -length/2 : length/2, y: 0 },
            pointA: anchor,
            stiffness: 1,
            length: 0
        });

        // 리미트 (기본 각도로 돌아오게 하는 고무줄)
        const limit = Constraint.create({
            bodyB: flipper,
            pointB: { x: side === 'left' ? length/2 : -length/2, y: 0 },
            pointA: { x: anchor.x, y: anchor.y + 20 },
            stiffness: 0.1,
            length: 40,
            render: { visible: false }
        });

        World.add(world, [flipper, pin, limit]);
        return flipper;
    }

    const leftFlipper = createFlipper(120, 550, 'left');
    const rightFlipper = createFlipper(280, 550, 'right');

    // 4. 간식 범퍼 (닿으면 튕겨나감)
    const snacks = [
        { x: 100, y: 200, type: '🌿' }, { x: 300, y: 200, type: '🥫' },
        { x: 200, y: 350, type: '🧆' }, { x: 150, y: 100, type: '🐱' }
    ].map(s => {
        const b = Bodies.circle(s.x, s.y, 25, {
            isStatic: true,
            render: { fillStyle: 'transparent' }
        });
        b.label = 'snack';
        b.emoji = s.type;
        return b;
    });
    World.add(world, snacks);

    // 조작 이벤트
    window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') Body.setAngularVelocity(leftFlipper, -0.4);
        if (e.code === 'ArrowRight') Body.setAngularVelocity(rightFlipper, 0.4);
    });

    // 커스텀 렌더링 (이모지 그리기)
    Events.on(render, 'afterRender', () => {
        const context = render.context;
        context.font = "30px Arial";
        context.textAlign = "center";
        context.textBaseline = "middle";
        
        snacks.forEach(s => {
            context.fillText(s.emoji, s.position.x, s.position.y);
        });

        // 고양이 공 얼굴 그리기
        context.font = "15px Arial";
        context.fillText("◕ㅅ◕", catBall.position.x, catBall.position.y);
    });

    // 공 탈출 리스폰
    Events.on(engine, 'afterUpdate', () => {
        if (catBall.position.y > 650) {
            Body.setPosition(catBall, { x: 200, y: 50 });
            Body.setVelocity(catBall, { x: 0, y: 0 });
        }
    });

</script>
</body>
</html>
